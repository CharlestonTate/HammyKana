<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HammyKana</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/site/site.min.css" rel="stylesheet">
</head>
<body>
  <header class="header">
    <button type="button" class="header-button" id="gallery-button" aria-label="Open kana gallery">
      Gallery
    </button>
    <nav class="tab-nav" aria-label="Script selection">
      <button type="button" class="tab active" data-script="hiragana">Hiragana</button>
      <button type="button" class="tab" data-script="katakana">Katakana</button>
    </nav>
    <div class="header-actions">
      <button type="button" class="header-button" id="about-button" aria-label="Open about page">
        About
      </button>
      <button type="button" class="header-button" id="settings-button" aria-label="Open settings">
        Settings
      </button>
    </div>
  </header>

  <main id="app" class="app"></main>

  <div class="hammy-shell">
    <div class="hammy-bubble" id="hammy-message"></div>
    <img id="hammy-image" src="img/idle1.png" alt="Hammy the hamster">
  </div>

  <script src="data/hiragana.js"></script>
  <script src="data/katakana.js"></script>
  <script src="data/words.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/lessons.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/ui.js"></script>
  <script src="hammy.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
